<script>
// Personal Activity Tracker using OPFS
// This demonstrates ethical data tracking with user consent and transparency

class OPFSTracker {
    constructor() {
        this.dataFileName = 'activities.json';
        this.activities = [];
        this.init();
    }

    async init() {
        try {
            // Check if OPFS is supported
            if (!('storage' in navigator) || !('getDirectory' in navigator.storage)) {
                this.showError('Origin Private File System (OPFS) is not supported in this browser. Please use a modern browser like Chrome, Edge, or Firefox.');
                return;
            }

            // Load existing data
            await this.loadData();
            this.updateStats();
            this.bindEvents();
            this.showSuccess('Application initialized successfully. Your data is stored privately in your browser.');
        } catch (error) {
            console.error('Initialization error:', error);
            this.showError('Failed to initialize the application: ' + error.message);
        }
    }

    bindEvents() {
        const trackButton = shadowDocument.getElementById('trackButton');
        const activityInput = shadowDocument.getElementById('activityInput');
        const viewDataButton = shadowDocument.getElementById('viewDataButton');
        const clearDataButton = shadowDocument.getElementById('clearDataButton');
        const exportDataButton = shadowDocument.getElementById('exportDataButton');

        trackButton.addEventListener('click', () => this.trackActivity());
        activityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                this.trackActivity();
            }
        });
        viewDataButton.addEventListener('click', () => this.displayData());
        clearDataButton.addEventListener('click', () => this.clearAllData());
        exportDataButton.addEventListener('click', () => this.exportData());
    }

    async getOPFSRoot() {
        return await navigator.storage.getDirectory();
    }

    async loadData() {
        try {
            const opfsRoot = await this.getOPFSRoot();
            
            try {
                const fileHandle = await opfsRoot.getFileHandle(this.dataFileName);
                const file = await fileHandle.getFile();
                const text = await file.text();
                
                if (text.trim()) {
                    this.activities = JSON.parse(text);
                } else {
                    this.activities = [];
                }
            } catch (error) {
                // File doesn't exist yet, start with empty array
                this.activities = [];
            }
        } catch (error) {
            console.error('Error loading data:', error);
            this.activities = [];
        }
    }

    async saveData() {
        try {
            const opfsRoot = await this.getOPFSRoot();
            const fileHandle = await opfsRoot.getFileHandle(this.dataFileName, { create: true });
            const writable = await fileHandle.createWritable();
            
            await writable.write(JSON.stringify(this.activities, null, 2));
            await writable.close();
            
            return true;
        } catch (error) {
            console.error('Error saving data:', error);
            this.showError('Failed to save data: ' + error.message);
            return false;
        }
    }

    async trackActivity() {
        const activityInput = shadowDocument.getElementById('activityInput');
        const activity = activityInput.value.trim();

        if (!activity) {
            this.showError('Please enter an activity to track.');
            return;
        }

        const activityData = {
            id: Date.now(),
            text: activity,
            timestamp: new Date().toISOString(),
            date: new Date().toDateString()
        };

        this.activities.unshift(activityData); // Add to beginning of array

        const saved = await this.saveData();
        if (saved) {
            activityInput.value = '';
            this.updateStats();
            this.showSuccess(`Activity tracked: "${activity}"`);
        }
    }

    displayData() {
        const dataDisplay = shadowDocument.getElementById('dataDisplay');
        
        if (this.activities.length === 0) {
            dataDisplay.innerHTML = '<p>No activities tracked yet. Start by adding an activity above!</p>';
            return;
        }

        const activitiesHTML = this.activities.map(activity => `
            <div class="activity-item">
                <div class="activity-timestamp">${new Date(activity.timestamp).toLocaleString()}</div>
                <div class="activity-text">${this.escapeHtml(activity.text)}</div>
            </div>
        `).join('');

        dataDisplay.innerHTML = activitiesHTML;
    }

    async clearAllData() {
        if (!confirm('Are you sure you want to delete all tracked activities? This action cannot be undone.')) {
            return;
        }

        try {
            const opfsRoot = await this.getOPFSRoot();
            await opfsRoot.removeEntry(this.dataFileName);
            this.activities = [];
            this.updateStats();
            shadowDocument.getElementById('dataDisplay').innerHTML = '<p>All data has been cleared.</p>';
            this.showSuccess('All activity data has been deleted.');
        } catch (error) {
            if (error.name === 'NotFoundError') {
                // File doesn't exist, which is fine
                this.activities = [];
                this.updateStats();
                this.showSuccess('All activity data has been cleared.');
            } else {
                console.error('Error clearing data:', error);
                this.showError('Failed to clear data: ' + error.message);
            }
        }
    }

    exportData() {
        if (this.activities.length === 0) {
            this.showError('No data to export.');
            return;
        }

        const exportData = {
            exportDate: new Date().toISOString(),
            totalActivities: this.activities.length,
            activities: this.activities
        };

        const dataStr = JSON.stringify(exportData, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        
        const link = document.createElement('a');
        link.href = URL.createObjectURL(dataBlob);
        link.download = `activity-data-${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        
        this.showSuccess('Data exported successfully!');
    }

    updateStats() {
        const totalActivities = this.activities.length;
        const today = new Date().toDateString();
        const todayActivities = this.activities.filter(activity => activity.date === today).length;
        
        shadowDocument.getElementById('totalActivities').textContent = totalActivities;
        shadowDocument.getElementById('todayActivities').textContent = todayActivities;
        
        // Calculate approximate storage used
        const dataSize = JSON.stringify(this.activities).length;
        const sizeKB = (dataSize / 1024).toFixed(2);
        shadowDocument.getElementById('storageUsed').textContent = `${sizeKB} KB`;
    }

    showError(message) {
        this.showMessage(message, 'error');
    }

    showSuccess(message) {
        this.showMessage(message, 'success');
    }

    showMessage(message, type) {
        // Remove existing messages
        const existingMessages = shadowDocument.querySelectorAll('.error-message, .success-message');
        existingMessages.forEach(msg => msg.remove());

        const messageDiv = document.createElement('div');
        messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
        messageDiv.textContent = message;

        const container = shadowDocument.querySelector('.container');
        container.insertBefore(messageDiv, container.firstChild);

        // Auto-remove after 5 seconds
        setTimeout(() => {
            if (messageDiv.parentNode) {
                messageDiv.remove();
            }
        }, 5000);
    }

    escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
}

new OPFSTracker();

            }
            console.log('OPFS Files:', entries);
            return entries;
        } catch (error) {
            console.error('Error listing files:', error);
        }
    },

        try {
            const estimate = await navigator.storage.estimate();
            console.log('Storage Estimate:', estimate);

        } catch (error) {

    }
