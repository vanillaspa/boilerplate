    export function insertNote({ title, note }) {
        return executeQuery({
            sql: "INSERT INTO notes(title, note) VALUES ($1,$2) RETURNING id;",
            values: [title, note],
        }, 'notes');
    }
    export function deleteNote(id) {
        return executeQuery({
            sql: "DELETE FROM notes WHERE id=$1;",
            values: [id],
        }, 'notes');
    }
    export function getNotes(id) {
        if (id)
            return executeQuery({
                sql: "SELECT * FROM notes WHERE id=$1;",
                values: [id]
            }, 'notes');
        else
            return executeQuery({
                sql: "SELECT * FROM notes ORDER BY id DESC;",
            }, 'notes');
